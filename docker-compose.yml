services:
  lichtfeld:
    build: .
    image: lichtfeld-cloud-worker
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - LFS_DATA_PATH=/data
      - LFS_OUTPUT_PATH=/output
      - LFS_STRATEGY=${LFS_STRATEGY:-mcmc}
      - LFS_ITER=${LFS_ITER:-30000}
      - LFS_MAX_WIDTH=${LFS_MAX_WIDTH:-2560}
    volumes:
      - ./data:/data:ro
      - ./output:/output
    # Training runs via: bash run/train.sh [frames_dir] [output_dir]
    # Validation runs via: bash run/validate.sh
    # Status polling via: bash run/status.sh
